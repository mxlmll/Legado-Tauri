          EOF
          echo "===== build/pnpm-workspace.yaml ====="
          cat build/pnpm-workspace.yaml
          echo "===== build/.npmrc ====="
          cat build/.npmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@master
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@main
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@main
        with:
          packages: >-
            platform-tools
            build-tools;35.0.0
            platforms;android-35
            ndk;27.0.12077973
            cmdline-tools;latest

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v
          java -version
          sdkmanager --list | head -n 40 || true

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          
          set -e
          pnpm install --no-frozen-lockfile --config.strict-dep-builds=false || {
            echo "pnpm install reported ignored build scripts; approving pending builds and retrying"
            pnpm approve-builds --all || pnpm approve-builds core-js es5-ext esbuild vue-demi unplugin-auto-import unplugin-vue-components || true
            pnpm install --no-frozen-lockfile --config.strict-dep-builds=false
          }

      # - name: Type Check Frontend
      #   shell: bash
      #   run: |
      #     cd build
      #     pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust Android targets
        shell: bash
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Set Android env
        shell: bash
        run: |
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          NDK_VERSION=$(ls -1 /usr/local/lib/android/sdk/ndk | sort -V | tail -n 1)
          echo "NDK_HOME=/usr/local/lib/android/sdk/ndk/$NDK_VERSION" >> $GITHUB_ENV
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "BUILD_TOOLS_DIR=/usr/local/lib/android/sdk/build-tools/35.0.0" >> $GITHUB_ENV

      - name: Fix Gradle Java home
        shell: bash
        run: |
          set -e

          echo "JAVA_HOME=$JAVA_HOME"
          java -version

          while IFS= read -r file; do
            echo "Patching $file"
            sed -i '/^[[:space:]]*org\.gradle\.java\.home[[:space:]]*=/d' "$file"
          done < <(find build "$HOME/.gradle" -name "gradle.properties" -type f 2>/dev/null || true)

          echo "Check remaining org.gradle.java.home:"
          grep -R "org.gradle.java.home" build "$HOME/.gradle" || true


      - name: Debug Android env
        shell: bash
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "NDK_HOME=$NDK_HOME"
          echo "BUILD_TOOLS_DIR=$BUILD_TOOLS_DIR"
          test -d "$ANDROID_HOME"
          test -d "$NDK_HOME"
          test -f "$BUILD_TOOLS_DIR/apksigner"

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.APK_RELEASE_KEY_STORE }}" | base64 --decode > /tmp/key.jks
          test -s /tmp/key.jks

      - name: Write key.properties
        shell: bash
        run: |
          cat > build/src-tauri/gen/android/key.properties <<EOF
          keyAlias=${{ secrets.APK_RELEASE_KEY_ALIAS }}
          keyPassword=${{ secrets.APK_RELEASE_KEY_PASSWORD }}
          storeFile=/tmp/key.jks
          storePassword=${{ secrets.APK_RELEASE_STORE_PASSWORD }}
          EOF

      - name: Build Android APK
        shell: bash
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cd build
          pnpm tauri android build --apk --target aarch64

      - name: Check APK output
        shell: bash
        run: |
          find build/src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk"
          test -n "$(find build/src-tauri/gen/android/app/build/outputs/apk -type f -name '*.apk' -print -quit)"

      - name: Verify APK signature
        shell: bash
        run: |
          set -e

          find build/src-tauri/gen/android/app/build/outputs/apk -type f -name "*.apk" -print0 | while IFS= read -r -d '' apk; do
            "$BUILD_TOOLS_DIR/apksigner" verify --verbose "$apk"
          done

      - name: Upload Android Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-android
          path: |
            build/src-tauri/gen/android/app/build/outputs/apk/**/*.apk

