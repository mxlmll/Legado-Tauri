    #  - name: Type Check Frontend
    #    shell: bash
    #    run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Debug Cargo profile
