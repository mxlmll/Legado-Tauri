  build-android:
    name: Build Android
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
