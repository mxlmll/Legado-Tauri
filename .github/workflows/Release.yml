name: Build Legado Tauri (Full Auto)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.version.outputs.version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}

    steps:
      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/mgz0227/Legado-Tauri.git Source

      - name: Generate version metadata
        id: version
        shell: bash
        run: |
          set -e

          VERSION="$(grep -m1 '^version[[:space:]]*=' Source/src-tauri/Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"

          if [ -z "$VERSION" ]; then
            echo "Failed to detect version from Source/src-tauri/Cargo.toml"
            exit 1
          fi

          TIME="$(TZ='Asia/Shanghai' date +'%Y%m%d%H')"

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
            RELEASE_NAME="Beta-${VERSION}-${TIME}"
          else
            TAG_NAME="Beta-${VERSION}-${TIME}"
            RELEASE_NAME="$TAG_NAME"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

          echo "VERSION=$VERSION"
          echo "TAG_NAME=$TAG_NAME"
          echo "RELEASE_NAME=$RELEASE_NAME"

  build-linux:
    name: Build Linux
    needs:
      - prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Git Auth
        shell: bash
        run: |
          git config --global url."https://${{ secrets.TOKEN_MGZ }}@github.com/".insteadOf "https://github.com/"

      - name: Clone Source
        shell: bash
        run: |
          git clone https://github.com/mgz0227/Legado-Tauri.git Source

      - name: Move Project
        shell: bash
        run: |
          mkdir build
          cp -r Source/* build/
          
          
          

      - name: Write pnpm workspace policy
        shell: bash
        run: |
          cat > build/pnpm-workspace.yaml <<'EOF'
          packages:
            - '.'
          strictDepBuilds: false
          allowBuilds:
            esbuild: true
            vue-demi: true
            core-js: true
            es5-ext: true
            unplugin-auto-import: true
            unplugin-vue-components: true
          onlyBuiltDependencies:
            - esbuild
            - vue-demi
            - core-js
            - es5-ext
            - unplugin-auto-import
            - unplugin-vue-components
          ignoredBuiltDependencies: []
          EOF
          cat > build/.npmrc <<'EOF'
          strict-dep-builds=false
          ignore-scripts=false
          EOF
          echo "===== build/pnpm-workspace.yaml ====="
          cat build/pnpm-workspace.yaml
          echo "===== build/.npmrc ====="
          cat build/.npmrc

      - name: Setup pnpm
        uses: pnpm/action-setup@master
        with:
          run_install: false
          package_json_file: build/package.json

      - name: Setup Node
        uses: actions/setup-node@main
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: build/pnpm-lock.yaml

      - name: Show versions
        shell: bash
        run: |
          node -v
          pnpm -v

      - name: Install Dependencies
        shell: bash
        run: |
          cd build
          
          set -e
          pnpm install --no-frozen-lockfile --config.strict-dep-builds=false || {
            echo "pnpm install reported ignored build scripts; approving pending builds and retrying"
            pnpm approve-builds --all || pnpm approve-builds core-js es5-ext esbuild vue-demi unplugin-auto-import unplugin-vue-components || true
            pnpm install --no-frozen-lockfile --config.strict-dep-builds=false
          }

     # - name: Type Check Frontend
     #   shell: bash
      #  run: |
     #     cd build
      #    pnpm vue-tsc --noEmit

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        shell: bash
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libspeechd-dev \
            librsvg2-dev

          pkg-config --modversion glib-2.0
          pkg-config --cflags glib-2.0
          pkg-config --libs glib-2.0

      - name: Build Tauri App
        shell: bash
        env:
          CARGO_BUILD_JOBS: 1
          RUSTFLAGS: -C debuginfo=0
        run: |
          cd build
          pnpm tauri build

      - name: Pack binary with dist
        shell: bash
        run: |
          mkdir -p package/legado_tauri
          cp build/src-tauri/target/release/legado_tauri package/legado_tauri/
          cp -r build/dist package/legado_tauri/dist
          cd package
          zip -r Legado-Linux-with-dist.zip legado_tauri

      - name: Upload Binary With Dist Artifact
        uses: actions/upload-artifact@main
        with:
          name: Legado-Linux-with-dist
          path: package/Legado-Linux-with-dist.zip
          

      - name: Upload Dist Artifact
        uses: actions/upload-artifact@main
        with:
          name: Legado-dist
          path: |
            build/dist/**

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: legado-ubuntu-latest
          path: |
            build/src-tauri/target/release/bundle/appimage/*.AppImage
            build/src-tauri/target/release/bundle/deb/*.deb
            build/src-tauri/target/release/bundle/rpm/*.rpm
